<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Hand-Tracked Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 120px;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
            opacity: 0.7;
        }
        #input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the webcam */
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 0.8rem; color: #aaa; }
        .highlight { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Particle Morpher</h1>
        <p>🖐 <b>Move Hand:</b> Rotate Scene & Change Color</p>
        <p>👌 <b>Pinch (Thumb+Index):</b> Switch Shape & Explode</p>
    </div>

    <div id="video-container">
        <video id="input_video"></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 15000;
        const CAM_Z = 400;
        let currentShapeIndex = 0;
        let isPinching = false;
        
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        // Add subtle fog for depth
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = CAM_Z;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- PARTICLE SYSTEM ---
        // We store two buffers: 'position' (current) and 'target' (where they want to go)
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targets = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Initialize particles randomly
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 800;
            targets[i] = positions[i];
            colors[i] = 1; // White initially
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Create a custom texture for the particle (soft glow)
        const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/spark1.png');

        const material = new THREE.PointsMaterial({
            size: 2,
            map: sprite,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.8
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- SHAPE GENERATORS ---
        // Helper to get random point in sphere
        function getSpherePoint(r) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const rad = r * Math.cbrt(Math.random()); // Even distribution
            return {
                x: rad * Math.sin(phi) * Math.cos(theta),
                y: rad * Math.sin(phi) * Math.sin(theta),
                z: rad * Math.cos(phi)
            };
        }

        const shapes = [
            // 1. Sphere
            () => {
                const arr = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const p = getSpherePoint(150);
                    arr.push(p.x, p.y, p.z);
                }
                return arr;
            },
            // 2. Heart
            () => {
                const arr = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    // Parametric Heart logic
                    let t = Math.random() * Math.PI * 2;
                    let u = Math.random() * Math.PI; // slice density
                    
                    // Simple 3D heart approximation
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    const z = (Math.random() - 0.5) * 10; // Thickness
                    
                    const scale = 8;
                    // Spread points inside the volume
                    const r = Math.random(); 
                    
                    arr.push(x * scale * r, y * scale * r, z * scale);
                }
                return arr;
            },
            // 3. Saturn
            () => {
                const arr = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    // 70% Planet, 30% Rings
                    if (i < PARTICLE_COUNT * 0.7) {
                        const p = getSpherePoint(80);
                        arr.push(p.x, p.y, p.z);
                    } else {
                        // Ring
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 120 + Math.random() * 80;
                        arr.push(
                            Math.cos(angle) * radius,
                            (Math.random()-0.5) * 5, // Flat Y
                            Math.sin(angle) * radius
                        );
                    }
                }
                return arr;
            },
            // 4. Flower / Spiral
            () => {
                const arr = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const angle = i * 0.1;
                    const radius = Math.sqrt(i) * 2;
                    // Phyllotaxis spiral
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    const z = Math.sin(i * 0.05) * 50;
                    arr.push(x, y, z);
                }
                return arr;
            }
        ];

        function setShape(index) {
            const generator = shapes[index % shapes.length];
            const newTargets = generator();
            
            // Update target array
            for(let i=0; i<newTargets.length; i++) {
                targets[i] = newTargets[i];
            }
        }

        // Initialize first shape
        setShape(0);

        // --- HAND TRACKING LOGIC ---
        const videoElement = document.getElementById('input_video');
        
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Get key points
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const wrist = landmarks[0];

                // 1. Calculate Pinch (Distance between thumb and index)
                const pinchDist = Math.hypot(
                    thumbTip.x - indexTip.x, 
                    thumbTip.y - indexTip.y
                );
                
                // Pinch Trigger (Threshold usually around 0.05 - 0.1)
                if (pinchDist < 0.08) {
                    if (!isPinching) {
                        isPinching = true;
                        // TRIGGER: Next Shape + Explosion Color
                        currentShapeIndex++;
                        setShape(currentShapeIndex);
                        material.size = 5; // Flash size
                        setTimeout(() => { material.size = 2; }, 200);
                    }
                } else {
                    isPinching = false;
                }

                // 2. Map Hand Position to Rotation
                // MediaPipe x/y is 0-1. 0.5 is center.
                const rotX = (wrist.y - 0.5) * 2; 
                const rotY = (wrist.x - 0.5) * 2; 

                // Lerp rotation for smoothness
                particleSystem.rotation.x += (rotX - particleSystem.rotation.x) * 0.1;
                particleSystem.rotation.y += (rotY - particleSystem.rotation.y) * 0.1;

                // 3. Map Depth (Z is estimated) to Color Hue
                // Note: landmarks z is relative depth.
                const hue = Math.abs(wrist.z * 5 % 1); // rough mapping
                const colorObj = new THREE.Color().setHSL(hue + (Date.now() * 0.0001), 0.8, 0.5);
                material.color = colorObj;

            } else {
                // Idle rotation if no hand
                particleSystem.rotation.y += 0.002;
                material.color.setHSL((Date.now() * 0.0002) % 1, 0.8, 0.5);
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        cameraUtils.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Morph Logic
            const positionsArr = geometry.attributes.position.array;
            
            // Speed of morphing
            const lerpSpeed = 0.05;

            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                // Lerp current position towards target
                positionsArr[i] += (targets[i] - positionsArr[i]) * lerpSpeed;
                
                // Add a little noise/vibration
                if (!isPinching) {
                    positionsArr[i] += (Math.random() - 0.5) * 0.5;
                }
            }

            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
